<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Kensho CMS Portal</title>
  <link href="config.yml" type="text/yaml" rel="cms-config-url">
  <!-- Brand Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <!-- CMS UI Styling -->
  <link rel="stylesheet" href="cms.css" />
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    const BlogPreview = createClass({
      render: function() {
        const entry = this.props.entry;
        const image = entry.getIn(['data', 'image']);
        const title = entry.getIn(['data', 'title']);
        const date = entry.getIn(['data', 'date']);
        const category = entry.getIn(['data', 'category']);
        const bg = this.props.getAsset(image);

        return h('div', { className: 'cms-preview-wrapper' },
          h('div', { 
            className: 'preview-hero',
            style: { backgroundImage: 'url(' + bg.toString() + ')' }
          },
            h('h1', { className: 'preview-title' }, title),
            h('div', { className: 'preview-meta-row' },
              category ? h('div', { className: 'preview-category' }, category.toUpperCase()) : null
            )
          ),
          h('div', { className: 'preview-content' },
            this.props.widgetFor('body')
          )
        );
      }
    });

    CMS.registerPreviewTemplate("blog", BlogPreview);
    CMS.registerPreviewStyle("cms.css");

    // TABLE VIEW TRANSFORMATION SCRIPT
    // This watches the CMS list and splits our "##" separator into columns
    const transformToTable = () => {
      const cards = document.querySelectorAll('.nc-collectionPage-sidebar + div ul li h2, .nc-card-list-item h2');
      
      cards.forEach(card => {
        const text = card.innerText;
        if (text.includes('##')) {
          const parts = text.split('##').map(p => p.trim());
          const title = parts[0];
          const dateFull = parts[1];
          const slug = parts[2];

          // Format Date (Remove time if exists)
          const dateOnly = dateFull.split(' ')[0] || dateFull;

          card.innerHTML = `
            <div class="cms-table-row">
              <div class="cms-col-title">${title}</div>
              <div class="cms-col-date">${dateOnly}</div>
              <div class="cms-col-link">
                <a href="https://kenshomediagroup.com/blogs/${slug}" target="_blank" class="cms-view-btn">VIEW PAGE →</a>
              </div>
            </div>
          `;
        }
      });
    };

    // Run the transformation whenever the page changes
    const observer = new MutationObserver(transformToTable);
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
