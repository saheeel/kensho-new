local_backend: true
backend:
  name: github
  repo: saheeel/kensho-new # REPLACE THIS with your github repo path (e.g. saheeel/kensho-new)
  branch: main
  base_url: https://github-auth-kensho.vercel.app/ # Example Auth provider URL

media_folder: "public/blogs" # Media files will be stored in the repo under public/blogs
public_folder: "/blogs" # The src attribute for specified images will be /blogs/filename.ext

collections:
  - name: "blog" # Used in routes, e.g., /admin/#/collections/blog
    label: "Blog" # Used in the UI
    folder: "src/content/blogs" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents in this collection
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}" # Filename template, e.g., YYYY-MM-DD-title.md
    fields: # The fields for each document, usually in front matter
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Category", name: "category", widget: "select", options: ["Marketing", "Production", "Strategy", "Design", "Case Study"] }
      - { label: "Featured Image", name: "image", widget: "image" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
